<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Гостиничный сервис | Прототип</title>
  <style>
    :root {
      --primary: #2563eb; --primary-hover: #1d4ed8; --bg: #f8fafc;
      --card-bg: #ffffff; --text: #1e293b; --text-light: #64748b;
      --border: #e2e8f0; --success: #16a34a; --error: #dc2626;
      --radius: 12px; --shadow: 0 4px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

    header { background: linear-gradient(135deg, #1e3a8a, #2563eb); color: #fff; padding: 24px 0; margin-bottom: 30px; }
    header h1 { font-size: 2rem; font-weight: 700; }
    .slogan { opacity: 0.85; font-style: italic; margin-top: 4px; font-size: 1.1rem; }

    footer { background: #1e293b; color: #cbd5e1; padding: 28px 0; margin-top: 50px; }
    .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
    footer strong { color: #fff; }

    .btn { padding: 10px 20px; border: none; border-radius: var(--radius); cursor: pointer; font-size: 1rem; transition: 0.2s; font-weight: 500; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-secondary { background: #64748b; color: #fff; }
    .btn-secondary:hover { background: #475569; }
    .btn-block { width: 100%; margin-top: 12px; }

    .filters { background: var(--card-bg); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 30px; }
    .filters h3 { margin-bottom: 12px; }
    .filter-options { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 16px; }
    .filter-options label { cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .filter-actions { display: flex; gap: 10px; flex-wrap: wrap; }

    .rooms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
    .room-card { background: var(--card-bg); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); transition: transform 0.2s; display: flex; flex-direction: column; }
    .room-card:hover { transform: translateY(-5px); }
    .room-img { width: 100%; height: 180px; object-fit: cover; background: #e2e8f0; display: block; }
    .room-body { padding: 18px; flex: 1; display: flex; flex-direction: column; }
    .room-body h3 { margin-bottom: 6px; font-size: 1.25rem; }
    .room-price { color: var(--primary); font-weight: 700; font-size: 1.15rem; margin-bottom: 8px; }
    .room-desc { color: var(--text-light); font-size: 0.9rem; margin-bottom: 16px; flex: 1; }
    .empty-state { grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-light); background: var(--card-bg); border-radius: var(--radius); }

    .booking-wrapper { max-width: 600px; margin: 0 auto; background: var(--card-bg); padding: 28px; border-radius: var(--radius); box-shadow: var(--shadow); }
    .booking-header { margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 500; }
    .form-group input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; transition: 0.2s; }
    .form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .error-msg { color: var(--error); font-size: 0.85rem; margin-top: 4px; display: block; min-height: 16px; }
    .form-message { margin-top: 16px; padding: 12px; border-radius: 8px; text-align: center; display: none; font-weight: 500; }
    .form-message.success { background: #dcfce7; color: var(--success); border: 1px solid #bbf7d0; }
    .form-message.error { background: #fee2e2; color: var(--error); border: 1px solid #fecaca; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 16px; color: var(--primary); cursor: pointer; font-weight: 500; }
    .back-link:hover { text-decoration: underline; }

    @media (max-width: 650px) { header { text-align: center; } .form-row { grid-template-columns: 1fr; } .rooms-grid { grid-template-columns: 1fr; } }

    .page { display: none; }
    .page.active { display: block; }
  </style>
</head>
<body>

  <header>
    <div class="container">
      <h1>🏨 HotelService</h1>
      <p class="slogan">Комфорт, который вы заслуживаете</p>
    </div>
  </header>

  <!-- СТРАНИЦА КАТАЛОГ -->
  <main id="catalog-page" class="page active">
    <div class="container">
      <section class="filters">
        <h3>🔍 Фильтр по категориям</h3>
        <div class="filter-options">
          <label><input type="checkbox" class="cat-filter" value="Эконом"> Эконом</label>
          <label><input type="checkbox" class="cat-filter" value="Стандарт"> Стандарт</label>
          <label><input type="checkbox" class="cat-filter" value="Люкс"> Люкс</label>
          <label><input type="checkbox" class="cat-filter" value="Апартаменты"> Апартаменты</label>
        </div>
        <div class="filter-actions">
          <button id="apply-filter" class="btn btn-primary">✅ Применить</button>
          <button id="reset-filter" class="btn btn-secondary">🔄 Сбросить фильтр</button>
        </div>
      </section>

      <section class="rooms-grid" id="rooms-container">
        <!-- Номера генерируются через JS -->
      </section>
    </div>
  </main>

  <!-- СТРАНИЦА БРОНИРОВАНИЕ -->
  <main id="booking-page" class="page">
    <div class="container">
      <div class="booking-wrapper">
        <div class="back-link" onclick="showPage('catalog')">← Вернуться в каталог</div>
        <div class="booking-header">
          <h2>Бронирование номера</h2>
          <p id="selected-room-info" style="color: var(--text-light); margin-top: 4px;"></p>
        </div>

        <form id="booking-form" novalidate>
          <div class="form-group">
            <label for="fname">Имя *</label>
            <input type="text" id="fname" placeholder="Иван Иванович" required>
            <span class="error-msg" id="err-fname"></span>
          </div>
          <div class="form-group">
            <label for="lname">Фамилия *</label>
            <input type="text" id="lname" placeholder="Иванов" required>
            <span class="error-msg" id="err-lname"></span>
          </div>
          <div class="form-group">
            <label for="phone">Телефон *</label>
            <input type="text" id="phone" placeholder="+7(999)123-45-67" required>
            <span class="error-msg" id="err-phone"></span>
          </div>
          <div class="form-group">
            <label for="email">E-mail *</label>
            <input type="text" id="email" placeholder="example@mail.ru" required>
            <span class="error-msg" id="err-email"></span>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="date-in">Дата заезда *</label>
              <input type="text" id="date-in" placeholder="ДД:ММ:ГГГГ" required>
              <span class="error-msg" id="err-date-in"></span>
            </div>
            <div class="form-group">
              <label for="date-out">Дата выезда *</label>
              <input type="text" id="date-out" placeholder="ДД:ММ:ГГГГ" required>
              <span class="error-msg" id="err-date-out"></span>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-block">📤 Отправить заявку</button>
          <div id="form-message" class="form-message"></div>
        </form>
      </div>
    </div>
  </main>

  <footer>
    <div class="container footer-grid">
      <div>📍 <strong>Адрес:</strong> г. Москва, ул. Примерная, 10</div>
      <div>🕒 <strong>Режим работы:</strong> 08:00–22:00</div>
      <div>📞 <strong>Телефон:</strong> +7 (495) 123-45-67</div>
      <div>📧 <strong>E-mail:</strong> info@hotel-example.ru</div>
    </div>
  </footer>

  <script>
    // ==========================================
    // 📷 ЗДЕСЬ ВСТАВЛЯЙТЕ ПУТИ К ВАШИМ КАРТИНКАМ
    // Формат: img: "путь/к/файлу.jpg"
    // ==========================================
    const rooms = [
      { id: 1, category: "Эконом", price: 2500, img: "12345.png", desc: "Wi-Fi, ТВ, Душ, Кондиционер" },
      { id: 2, category: "Стандарт", price: 4200, img: "12.png", desc: "Wi-Fi, ТВ, Мини-бар, Балкон" },
      { id: 3, category: "Люкс", price: 7500, img: "123.png", desc: "Панорамный вид, Джакузи, Завтрак" },
      { id: 4, category: "Апартаменты", price: 11000, img: "1234.png", desc: "Кухня, 2 спальни, Стир. машина" },
      { id: 5, category: "Эконом", price: 2800, img: "12345.png", desc: "Wi-Fi, ТВ, Общая кухня" },
      { id: 6, category: "Стандарт", price: 4000, img: "12.png", desc: "ТВ, Фен, Сейф, Рабочий стол" },
      { id: 7, category: "Люкс", price: 8200, img: "123.png", desc: "Спа-доступ, Халат, Бар" },
      { id: 8, category: "Апартаменты", price: 12500, img: "1234.png", desc: "Вид на город, Кофемашина" }
    ];

    const container = document.getElementById('rooms-container');
    let currentRooms = [];

    // Перемешивание массива и выбор 6 случайных
    const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);
    const getRandom6 = () => shuffle(rooms).slice(0, 6);

    function renderRooms(list) {
      container.innerHTML = '';
      if (list.length === 0) {
        container.innerHTML = '<div class="empty-state">Номера не найдены. Попробуйте изменить параметры фильтрации.</div>';
        return;
      }
      list.forEach(room => {
        const card = document.createElement('div');
        card.className = 'room-card';
        card.innerHTML = `
          <img src="${room.img}" alt="${room.category}" class="room-img" onerror="this.style.background='#e2e8f0'; this.alt='Изображение не найдено';">
          <div class="room-body">
            <h3>${room.category}</h3>
            <div class="room-price">${room.price.toLocaleString('ru-RU')} ₽ / ночь</div>
            <div class="room-desc">${room.desc}</div>
            <button class="btn btn-primary btn-block" onclick="openBooking(${room.id})">Забронировать</button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // Навигация между страницами
    window.showPage = page => {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(page === 'catalog' ? 'catalog-page' : 'booking-page').classList.add('active');
      window.scrollTo(0, 0);
      if (page === 'catalog') document.getElementById('form-message').style.display = 'none';
    };

    window.openBooking = id => {
      const room = rooms.find(r => r.id === id);
      document.getElementById('selected-room-info').textContent = `Выбран: ${room.category} • ${room.price.toLocaleString('ru-RU')} ₽`;
      document.getElementById('booking-form').reset();
      document.querySelectorAll('.error-msg').forEach(e => e.textContent = '');
      showPage('booking');
    };

    // Фильтрация
    document.getElementById('apply-filter').addEventListener('click', () => {
      const checked = [...document.querySelectorAll('.cat-filter:checked')].map(cb => cb.value);
      if (checked.length === 0) return alert('Пожалуйста, выберите хотя бы одну категорию.');
      currentRooms = rooms.filter(r => checked.includes(r.category));
      renderRooms(currentRooms);
    });

    document.getElementById('reset-filter').addEventListener('click', () => {
      document.querySelectorAll('.cat-filter').forEach(cb => cb.checked = false);
      currentRooms = getRandom6();
      renderRooms(currentRooms);
    });

    // Инициализация
    currentRooms = getRandom6();
    renderRooms(currentRooms);

    // Валидация формы бронирования
    const form = document.getElementById('booking-form');
    const msgBox = document.getElementById('form-message');

    form.addEventListener('submit', e => {
      e.preventDefault();
      msgBox.style.display = 'none';
      msgBox.className = 'form-message';
      document.querySelectorAll('.error-msg').forEach(el => el.textContent = '');

      const get = id => document.getElementById(id).value.trim();
      const setErr = (id, txt) => document.getElementById(id).textContent = txt;

      const data = {
        fn: get('fname'), ln: get('lname'),
        ph: get('phone'), em: get('email'),
        dIn: get('date-in'), dOut: get('date-out')
      };

      const re = {
        name: /^[А-Яа-яЁё\s\.\-]{2,}$/,
        phone: /^\+7\(\d{3}\)\d{3}-\d{2}-\d{2}$/,
        email: /^[^\s@]+@[^\s@]+\.[^\s@]+$/,
        date: /^(0[1-9]|[12]\d|3[01]):(0[1-9]|1[0-2]):\d{4}$/
      };

      let isValid = true;
      if (!re.name.test(data.fn)) { setErr('err-fname', 'Кириллица, пробелы, точки, тире'); isValid = false; }
      if (!re.name.test(data.ln)) { setErr('err-lname', 'Кириллица, пробелы, точки, тире'); isValid = false; }
      if (!re.phone.test(data.ph)) { setErr('err-phone', 'Формат: +7(XXX)XXX-XX-XX'); isValid = false; }
      if (!re.email.test(data.em)) { setErr('err-email', 'Некорректный email'); isValid = false; }
      if (!re.date.test(data.dIn)) { setErr('err-date-in', 'Формат: ДД:ММ:ГГГГ'); isValid = false; }
      if (!re.date.test(data.dOut)) { setErr('err-date-out', 'Формат: ДД:ММ:ГГГГ'); isValid = false; }

      if (isValid) {
        const parseD = s => { const [d,m,y] = s.split(':').map(Number); return new Date(y, m-1, d); };
        if (parseD(data.dOut) <= parseD(data.dIn)) {
          setErr('err-date-out', 'Дата выезда должна быть позже заезда');
          isValid = false;
        }
      }

      if (!isValid) {
        msgBox.textContent = '❌ Исправьте ошибки в форме';
        msgBox.classList.add('error');
        msgBox.style.display = 'block';
        return;
      }

      msgBox.textContent = '✅ Заявка успешно отправлена! Менеджер свяжется с вами в ближайшее время.';
      msgBox.classList.add('success');
      msgBox.style.display = 'block';
      form.reset();
    });
  </script>
</body>
</html>
